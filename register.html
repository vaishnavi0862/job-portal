<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JobPortal India</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4F46E5;
        }
        
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .auth-btn:hover {
            background: #4338CA;
        }
        
        .auth-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        
        .auth-footer a {
            color: #4F46E5;
            text-decoration: none;
            font-weight: 500;
        }
        
        .alert {
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        .radio-group {
            display: flex;
            gap: 2rem;
            margin-top: 0.5rem;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
        }
        
        .radio-group input {
            width: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-briefcase"></i>
                    <span>JobPortal India</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="jobs.html">Browse Jobs</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="login.html" class="login-btn">Login</a>
                <a href="register.html" class="active register-btn">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join our community today</p>
            </div>
            
            <div id="alertMessage"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" required placeholder="Create a password (min. 6 characters)">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>
                <div class="form-group">
                    <label>I am a:</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="role" value="jobseeker" checked> Job Seeker
                        </label>
                        <label>
                            <input type="radio" name="role" value="recruiter"> Recruiter
                        </label>
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="registerBtn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3><i class="fas fa-briefcase"></i> JobPortal India</h3>
                <p>Find your dream job in India with us.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 JobPortal India. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const API_URL = '/api';
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const registerBtn = document.getElementById('registerBtn');
            const alertDiv = document.getElementById('alertMessage');
            
            alertDiv.innerHTML = '';
            
            if (!fullName || !email || !password) {
                alertDiv.innerHTML = '<div class="alert alert-error">Please fill in all fields</div>';
                return;
            }
            
            if (password.length < 6) {
                alertDiv.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters</div>';
                return;
            }
            
            if (password !== confirmPassword) {
                alertDiv.innerHTML = '<div class="alert alert-error">Passwords do not match</div>';
                return;
            }
            
            registerBtn.textContent = 'Creating account...';
            registerBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, role })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message);
                }
                
                alertDiv.innerHTML = '<div class="alert alert-success">Account created successfully! Redirecting to login...</div>';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                registerBtn.textContent = 'Create Account';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
